# Inference config for Camera (PRoPE) Bidirectional + I2V Wan2.2-TI2V-5B.
# Used by scripts/inference/inference_bidir_camera.py with the single
# ``algorithm.i2v`` switch flipped to true.
#
# Differences vs configs/infer_bidir_camera.yaml:
#   * algorithm.i2v: true            -> turns on I2V branch in the script
#   * inference.image_path           -> path to a text file with one source
#                                       image path per line, aligned 1-to-1
#                                       with prompts and trajectories.
# The script encodes each source image with the Wan VAE, pins it into x[:, :1],
# and re-pins after every scheduler.step so the conditioning frame is never
# disturbed by the predicted velocity.

algorithm:
  causal: false
  use_camera: true
  i2v: true

model_kwargs:
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  use_camera: true

inference:
  sampling_steps: 50
  guidance_scale: 5.0
  num_latent_frames: 20      # F_lat (matches training)
  height_latent: 44          # 704 / 16
  width_latent: 80           # 1280 / 16
  num_channels: 48
  fps: 24

  # Trajectory parser:
  #   * worldplaygen (default) — single-token "w-N,left-N,..." DSL, parsed by
  #     scripts/data_preprocessing/build_camera_lmdb_5b.poses_from_pose_str.
  #     Use this for training-aligned inference.
  #   * sana_dsl — sana-WM action DSL ("w-10,iw-5,none-3" with combo keys,
  #     exponential velocity smoother, ground-locked translation). Goes
  #     through utils/sana_camera_control.py and the same build_viewmats_and_Ks.
  trajectory_format: sana_dsl

  # Intrinsics source (priority order):
  #   1. The four *_norm fields below, when present (highest priority).
  #   2. estimate_intrinsics: true → run Pi3X on the first I2V source image
  #      (per clip). Requires algorithm.i2v: true and the Pi3X repo on
  #      PYTHONPATH (vendored under code/Pi3).
  #   3. Otherwise fall back to poses_from_pose_str's WorldPlayGen defaults.
  estimate_intrinsics: true

  # Action overlay (Genie-3 / sana-WM style WASD-cluster + rotation
  # joystick painted onto each output frame). Driven by the raw-frame c2w
  # trajectory so it tracks every key press at the video frame rate.
  # ``overlay_corner`` is one of bottom-left / bottom-right / top-left /
  # top-right. Disabled by default; enable for debug / demo videos.
  action_overlay: true
  overlay_corner: bottom-left

  # Default WorldPlayGen-style intrinsics (1920x1080 capture, f≈969.7).
  # Comment these four lines out to fall through to (2) or (3).
  # fx_norm: 0.5050505050505051
  # fy_norm: 0.8978675264437377
  # cx_norm: 0.5
  # cy_norm: 0.5
  # Where to find prompts and trajectories (one per line).
  prompt_path: prompts/prompts.txt
  trajectory_path: prompts/trajectories.txt
  # I2V: one source-image path per line, aligned 1-to-1 with prompts/trajectories.
  image_path: prompts/images.txt

checkpoints:
  generator_ckpt: ""   # filled at runtime via --generator_ckpt

logging:
  output_dir: videos/camera_bidir_i2v
