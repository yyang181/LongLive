# Camera (PRoPE) Bidirectional SFT — Wan2.2-TI2V-5B
# Equivalent to minWM/Wan21/configs/bidirectional_camera.yaml, ported to LongLive.

infra:
  mixed_precision: true
  sharding_strategy: hybrid_full
  generator_fsdp_wrap_strategy: size
  text_encoder_fsdp_wrap_strategy: size
  num_workers: 4
  seed: 0
  gc_interval: 100
  log_interval: 10
  save_interval: 1000

algorithm:
  trainer: camera_bidirectional_diffusion
  causal: false
  use_camera: true
  num_train_timestep: 1000

# 5B backbone with PRoPE injected at construction time.
model_kwargs:
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  use_camera: true

training:
  lr: 2.0e-06
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.01
  ema_weight: 0.99
  ema_start_step: 0
  max_grad_norm: 10.0
  batch_size: 1
  total_batch_size: 8        # 8 GPUs * batch_size 1 (no grad-accum by default)
  max_iters: 30000

data:
  data_path: ./dataset/LongLive/CameraSFT/data
  # [B, F_lat, C, H_lat, W_lat] for Wan2.2-TI2V-5B (4x temporal, 16x spatial).
  # 20 latent frames -> 77 raw frames; 44x80 latent grid -> 704x1280 raw.
  image_or_video_shape: [1, 20, 48, 44, 80]

logging:
  wandb_entity: null
  wandb_project: LongLive-CameraSFT
