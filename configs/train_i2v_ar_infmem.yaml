# ============================================================================
# I2V AR + Echo-Infinity Memory + Relative RoPE
# ---------------------------------------------------------------------------
# Baseline: configs/train_i2v_ar.yaml (Wan2.2-TI2V-5B, teacher-forcing I2V AR)
#
# Only difference: `model_kwargs.wrapper_cls` swaps in
# `utils.infinity_memory_wrapper.InfMemWanDiffusionWrapper`, which:
#   1. Attaches a QueryMemoryEncoder as `self.model.query_memory_encoder`
#      (mounted via object.__setattr__ so FSDP flatten-params ignores it).
#   2. Monkey-patches every CausalWanAttentionBlock to route sink|memory|local|Q
#      through the Echo-Infinity Relative-RoPE layout (`enable_relative_rope`).
#   3. Falls back bit-exact to the base wrapper whenever `enable_relative_rope`
#      is False and `memory_kwargs` is None.
#
# The extra `training.encoder_lr_multiplier` is consumed by the trainer, not
# by the model constructor -- it is used to build a separate AdamW param group
# for the encoder (see model/diffusion.py::_initialize_models).
# ============================================================================
infra:
  # InfMem monkey-patches the causal self-attention KV-cache path. The current
  # sequence-parallel training override replaces that forward, so keep SP off
  # for this streaming-memory recipe.
  sequence_parallel_size: 1
  sharding_strategy: hybrid_full
  mixed_precision: true
  gradient_checkpointing: true
  vae_halo_latents: 28
  generator_fsdp_wrap_strategy: size
  text_encoder_fsdp_wrap_strategy: size

# Passed directly to InfMemWanDiffusionWrapper(**model_kwargs).
model_kwargs:
  # Dispatch key consumed by model/diffusion.py::_initialize_models.
  wrapper_cls: utils.infinity_memory_wrapper.InfMemWanDiffusionWrapper

  # --- Base WanDiffusionWrapper args (identical to train_i2v_ar.yaml) ---
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  num_frame_per_block: 4 # 8
  local_attn_size: 32
  # Echo-Infinity ships with sink_size=4 for I2V AR. Keep it in sync with
  # `inference.sink_size` below so training and inference match.
  sink_size: 4

  # --- Relative-RoPE (Echo-Infinity E-PRoPE for AR) ---
  enable_relative_rope: true
  # pmax must cover sink + active local + memory + query frames. With
  # sink=4, local_attn_size=32, Q_frames=8, and block=8, 48 is the safe window.
  relative_rope_pmax: 48

  # --- Query-Memory Encoder hyperparameters ---
  # Everything here is optional (defaults defined in InfMemWanDiffusionWrapper);
  # the block below reflects the Echo-Infinity 5B recipe.
  memory_kwargs:
    dim: 3072
    num_heads: 24
    num_layers: 30
    tokens_per_frame: 880          # 22 * 40 grid for 1280x704 latent (Wan2.2-TI2V-5B)
    Q_frames: 8                    # M = Q_frames * M_tokens_per_frame = 256 memory tokens
    M_tokens_per_frame: 32
    num_query_groups: 1
    bptt_clips: 2                  # truncate BPTT every N chunks
    encoder_lr_multiplier: 5.0
    use_sink_anchor: true          # anchor first Q group on sink KV
    use_batch_update: false        # per-chunk update (streaming)
    use_residual_update: true
    use_post_norm: true
    use_vib: false                 # variational information bottleneck (off by default)
    vib_kl_weight: 1.0e-4
    init_scale: 0.02

# I2V AR diffusion objective (unchanged).
algorithm:
  trainer: diffusion
  i2v: true
  causal: true
  teacher_forcing: true
  independent_first_frame: true
  num_train_timestep: 1000
  denoising_loss_type: flow

training:
  lr: 1.0e-05
  weight_decay: 0.0
  beta1: 0.0
  beta2: 0.999
  batch_size: 1
  gradient_accumulation_steps: 1
  ema_weight: 0.99
  ema_start_step: 100
  log_iters: 10
  max_checkpoints: 3
  max_iters: 9999999999999999999999
  infmem_streaming_training: true
  gc_interval: 100
  # Consumed by trainer/diffusion.py::_build_optimizer to size the encoder
  # param group. Redundant with memory_kwargs.encoder_lr_multiplier -- the
  # trainer uses whichever value the encoder object actually reports.
  encoder_lr_multiplier: 5.0
  error_recycling:
    enabled: true
    num_buckets: 50
    buffer_size_per_bucket: 500
    buffer_warmup_iter: 50
    context_inject_prob: 0.9
    latent_inject_prob: 0.9
    noise_inject_prob: 0.01
    clean_prob: 0.2
    clean_buffer_update_prob: 0.1
    modulate_factor: 0.3
    start_step: 0
    replacement_strategy: random

data:
  data_path: data/train/minWM-data/data
  image_or_video_shape: [1, 20, 48, 44, 80]
  load_raw_video: true

# Generation settings used by training-time evaluation.
inference:
  sampling_steps: 50
  sink_size: 4                     # must match model_kwargs.sink_size
  multi_shot_sink: true
  multi_shot_rope_offset: 8
  guidance_scale: 3.0
  independent_first_frame: true
  # Memory encoder is reset once per generated video (handled by
  # pipeline/causal_diffusion_inference.py::inference).
  negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'

# Lightweight validation generation during I2V AR training.
evaluation:
  interval: 0
  num_frames: 32
  use_ema: true
  val_batch_size: 1
  save_latents_only: true

logging:
  seed: 0
  wandb_key: null
  wandb_entity: null
  wandb_project: LongLive2-I2V-AR-InfMem
