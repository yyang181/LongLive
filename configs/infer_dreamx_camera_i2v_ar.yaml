# Inference config for DreamX Camera I2V AR — Wan2.2-TI2V-5B.
# Set checkpoints.generator_ckpt to the AR checkpoint produced by
# configs/train_dreamx_camera_i2v_ar.yaml.

model_kwargs:
  wrapper_cls: utils.dreamx_camera_wrapper.DreamXCameraWanDiffusionWrapper
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  num_frame_per_block: 4 # 8
  local_attn_size: 32
  sink_size: 4
  attn_compress: 1
  qk_norm: true

algorithm:
  causal: true
  i2v: true
  independent_first_frame: true
  use_camera: true

use_ema: false
output_folder: videos/dreamx_camera_i2v_ar
num_samples: 1
save_latents_only: false
save_with_index: true

data:
  # AR i2v inference now uses the same *three-file* input contract as the
  # bidirectional camera config (configs/infer_dreamx_camera_i2v.yaml):
  #   inference.image_path      – one source-image path per line
  #   inference.prompt_path     – one prompt per line
  #   inference.trajectory_path – one sana_dsl trajectory per line
  # ``inference.py`` detects these two paths under ``inference`` (or at the
  # top level) and switches from ``MultiVideoConcatDataset`` to the
  # ``ThreeFileI2VDataset`` branch, so ``data_path`` is no longer required
  # — we keep it as a harmless placeholder just for logging.
  data_path: (unused; three-file i2v mode)
  image_or_video_shape:
  - 1
  - 128
  - 48
  - 44
  - 80

inference:
  sampling_steps: 50
  sink_size: 4
  guidance_scale: 3.0
  multi_shot_sink: true
  multi_shot_rope_offset: 8
  independent_first_frame: true
  streaming_vae: false
  async_vae: false
  vae_type: wan
  vae_device: "cuda:2"

  # ---- Default: shared sana_dsl three-file set (active) ----
  # ``inference.py`` reads:
  #   * ``trajectory_path`` -> rolled out to per-frame c2w by
  #     ``utils.sana_camera_control.action_string_to_c2w`` for
  #     ``sana_dsl`` (or DreamX's action DSL for ``dreamx_action_dsl``),
  #     then converted via ``utils.camera_dataset.build_viewmats_and_Ks``
  #     into (viewmats, Ks) fed into pipeline.inference so the DreamX
  #     ``cam_self_attn`` branch sees the trajectory.
  #   * ``prompt_path``     -> one text prompt per line (paired 1-to-1
  #     with the trajectory line index).
  #   * ``image_path``      -> one source-image path per line, VAE-encoded
  #     into the first latent frame as the AR i2v conditioning.
  # This is exactly the same plumbing configs/infer_dreamx_camera_i2v.yaml
  # uses for the bidirectional entry point.
  trajectory_format: sana_dsl
  prompt_path: prompts/prompts.txt
  # trajectory_path: prompts/trajectories.txt
  trajectory_path: prompts/trajectories_complex.txt
  # I2V: one source-image path per line, aligned 1-to-1 with prompts/trajectories.
  image_path: prompts/images.txt

  ### action overlay
  action_overlay: true
  overlay_corner: bottom-left  # 可选，默认 bottom-left

checkpoints:
  generator_ckpt: logs/train_dreamx_camera_i2v_ar_b300/checkpoint_model_003000/model.pt
  lora_ckpt: null

logging:
  seed: 0
