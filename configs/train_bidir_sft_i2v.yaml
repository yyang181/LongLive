# Plain Bidirectional I2V SFT — Wan2.2-TI2V-5B (no camera / no PRoPE)
# Identical to train_bidir_sft.yaml but with the single ``algorithm.i2v`` switch
# flipped to true (and use_camera kept off). The same trainer pipeline pins the
# first latent frame as the clean conditioning frame and masks it out of the
# flow-matching loss; viewmats/Ks are loaded but ignored because use_camera is
# false. See configs/train_bidir_camera_i2v.yaml for the camera-enabled variant
# and trainer/camera_bidirectional_diffusion.py for the I2V wiring.

infra:
  mixed_precision: true
  sharding_strategy: hybrid_full
  generator_fsdp_wrap_strategy: size
  text_encoder_fsdp_wrap_strategy: size
  num_workers: 4
  seed: 0
  gc_interval: 100
  log_interval: 10
  save_interval: 1000
  # See train_bidir_sft.yaml for the full SP rationale; same constraints apply.
  sequence_parallel_size: 4

algorithm:
  trainer: camera_bidirectional_diffusion
  causal: false
  use_camera: false
  # >>> The I2V switch <<<
  i2v: true
  num_train_timestep: 1000
  num_frame_per_block: 1

# 5B backbone, plain bidirectional (no PRoPE injected at construction time).
model_kwargs:
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  use_camera: false

training:
  lr: 2.0e-06
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.01
  ema_weight: 0.99
  ema_start_step: 0
  max_grad_norm: 10.0
  batch_size: 1
  total_batch_size: null
  max_iters: 30000

data:
  data_path: data/train/minWM-data/data
  image_or_video_shape: [1, 20, 48, 44, 80]

logging:
  wandb_entity: null
  wandb_project: LongLive-SFT-I2V
