# ============================================================================
# DreamX Camera (E-PRoPE) I2V AR + Echo-Infinity Memory + Relative RoPE
# ---------------------------------------------------------------------------
# Baseline: configs/train_dreamx_camera_i2v_ar.yaml (Bidirectional + camera
# (E-PRoPE) I2V -> AR, Wan2.2-TI2V-5B, teacher-forcing I2V AR with DreamX
# cam_self_attn parallel camera branch).
#
# Init from a trained bidirectional DreamX Camera I2V checkpoint:
#   checkpoints.generator_ckpt=logs/train_dreamx_camera_i2v_b300/checkpoint_model_003000/model.pt
# or from a trained E-PRoPE I2V AR checkpoint:
#   checkpoints.generator_ckpt=logs/train_dreamx_camera_i2v_ar_b300/checkpoint_model_000590/model.pt
# ============================================================================

infra:
  sequence_parallel_size: 1
  sharding_strategy: hybrid_full
  mixed_precision: true
  # InfMem streaming mutates KV/memory state; PyTorch activation checkpointing
  # would recompute against a later cache state and fail metadata checks.
  gradient_checkpointing: false
  vae_halo_latents: 28
  generator_fsdp_wrap_strategy: size
  text_encoder_fsdp_wrap_strategy: size

model_kwargs:
  wrapper_cls: utils.dreamx_infmem_wrapper.DreamXInfMemWanDiffusionWrapper
  model_name: Wan2.2-TI2V-5B
  timestep_shift: 5.0
  num_frame_per_block: 4

  # Echo-Infinity-style 20-frame training window:
  # sink(4) + local(12) + memory(3) + block(4) = 23 < pmax(24).
  # local_attn_size must stay < data.image_or_video_shape[1] so eviction occurs.
  local_attn_size: 12
  sink_size: 4

  attn_compress: 1
  qk_norm: true

  enable_relative_rope: true
  relative_rope_pmax: 24

  memory_kwargs:
    hidden_dim: 1536
    num_heads: 12
    head_dim: 128
    n_encoder_layers: 2
    tokens_per_frame: 880
    Q_frames: 3
    M_tokens_per_frame: 32
    num_query_groups: 1
    bptt_clips: 1
    encoder_lr_multiplier: 5.0
    use_sink_anchor: false
    use_batch_update: false
    use_residual_update: true
    use_post_norm: true
    use_vib: false
    initializer_range: 0.014

algorithm:
  # Independent Echo-Infinity-style chunk-wise streaming trainer.
  trainer: dreamx_infmem_streaming_diffusion
  i2v: true
  causal: true
  teacher_forcing: true
  independent_first_frame: true
  num_train_timestep: 1000
  denoising_loss_type: flow

training:
  lr: 1.0e-05
  weight_decay: 0.0
  beta1: 0.0
  beta2: 0.999
  batch_size: 1
  gradient_accumulation_steps: 1
  ema_weight: 0.99
  ema_start_step: 100
  log_iters: 10
  max_checkpoints: 3
  max_iters: 9999999999999999999999
  infmem_streaming_training: true
  # Match Echo-Infinity: clean/context cache-memory update is a state update,
  # not a supervised prediction graph, so keep it under no_grad.
  infmem_clean_update_no_grad: true
  # Cache/memory update feeds x0_pred re-noised at this timestep (Echo-Infinity style).
  context_noise: 0
  infmem_strict_update: true
  gc_interval: 100
  encoder_lr_multiplier: 5.0
  # Independent gradient clipping for the encoder (falls back to max_grad_norm).
  infmem_max_grad_norm: 10.0
  # Periodic rank-consistency verification of encoder parameters.
  infmem_verify_sync_interval: 100
  # Allow partial InfMem resume (re-init encoder/optimizer if missing).
  allow_partial_infmem_resume: false
  # Generator and QueryMemoryEncoder EMA are maintained as a matched pair.
  allow_ema_without_encoder_ema: false
  allow_legacy_missing_infmem_ema: false
  error_recycling:
    enabled: true
    num_buckets: 50
    buffer_size_per_bucket: 500
    buffer_warmup_iter: 50
    context_inject_prob: 0.9
    latent_inject_prob: 0.9
    noise_inject_prob: 0.01
    clean_prob: 0.2
    clean_buffer_update_prob: 0.1
    modulate_factor: 0.3
    start_step: 0
    replacement_strategy: random

checkpoints:
  generator_ckpt: null

data:
  # data_path: data/train/minWM-data/data
  # image_or_video_shape: [1, 20, 48, 44, 80]
  data_path: data/train/dynmem-data/data_f40_h28_w52
  image_or_video_shape: [1, 40, 48, 28, 52]
  # Camera LMDB already stores latents; keeping this false avoids loading VAE
  # onto GPU during training.
  load_raw_video: false

inference:
  sampling_steps: 50
  sink_size: 4
  multi_shot_sink: true
  multi_shot_rope_offset: 8
  guidance_scale: 3.0
  independent_first_frame: true
  negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'

evaluation:
  interval: 0
  num_frames: 32
  use_ema: true
  val_batch_size: 1
  save_latents_only: true

logging:
  seed: 0
  wandb_key: null
  wandb_entity: null
  wandb_project: LongLive-DreamXCamera-I2V-AR-InfMem
